kind: Deployment
apiVersion: apps/v1
metadata: 
  name: deployment-myservice

spec:
  replicas: 2
  selector:
    matchLabels:
      service: myservice

  template:
    metadata:
      labels:
        service: myservice

    spec:
      containers:
        - name: v1
          image: manishramdhave/myservice:1.0
          ports:
            - containerPort: 8080
